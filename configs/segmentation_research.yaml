experiment:
  name: seg_research_resnet18
  output_dir: runs/seg_research_resnet18
  seed: 7

task:
  name: segmentation
  num_classes: 6
  ignore_index: 255

dataset:
  train:
    root: data/sample_rgbt
    split: train
    pairing_mode: folder
    rgb_dir: rgb
    thermal_dir: thermal
    mask_dir: masks
  val:
    root: data/sample_rgbt
    split: val
    pairing_mode: folder
    rgb_dir: rgb
    thermal_dir: thermal
    mask_dir: masks
  image_size: [320, 320]

model:
  backbone: resnet18
  fusion_strategy: research
  pretrained: true

training:
  epochs: 50
  batch_size: 6
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 8
  pin_memory: true
  amp: true
  amp_dtype: float16
  channels_last: true
  prefetch_factor: 2
  persistent_workers: true
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  grad_clip_norm: 1.0
  log_interval: 20
  resume_from: null

scheduler:
  name: poly
  power: 0.9
  min_lr: 1.0e-6

multi_gpu:
  enabled: true
  distributed: false

logging:
  tensorboard: true
